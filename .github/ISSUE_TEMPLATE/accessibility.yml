name: Accessibility feedback
description: Something gets in the way of how your brain or body actually works. We prioritize these.
title: "[a11y] "
labels: ["accessibility"]
body:
  - type: textarea
    id: context
    attributes:
      label: Your context
      description: |
        What neurodiverse profile, accommodation, or use case are you working from?
        (Examples: "ADHD, audio anchoring helps me re-read"; "Dyslexic, smaller fonts hurt"; "Auditory processing — I need 0.75× a lot".)
      placeholder: "I have..."
    validations:
      required: true

  - type: textarea
    id: friction
    attributes:
      label: The friction
      description: What specifically gets in the way? Be concrete.
    validations:
      required: true

  - type: textarea
    id: wanted
    attributes:
      label: What you'd want instead
      description: Even a rough sketch is useful.

  - type: textarea
    id: workaround
    attributes:
      label: Current workaround (if any)
      description: How are you dealing with it today?
